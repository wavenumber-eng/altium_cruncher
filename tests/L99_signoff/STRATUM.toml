name = "Release Signoff"
order = 99
description = "Final release signoff checks for versioning, CLI version output, Python hygiene, and design coverage"
enabled = true
concerns = ["release", "contracts", "signoff", "docs"]

objectives = [
    "Package version metadata matches the release date contract",
    "CLI version output matches package metadata",
    "Python signoff does not regress against the accepted baseline",
    "CLI parser commands, the command manifest, and CLI design docs stay synchronized",
    "Registered CLI commands have matching HTML design documentation",
    "Public config files have machine-readable schemas and generated-template conformance tests",
    "Dataclasses and major interfaces have design docs and Rack test ownership",
]

[dependencies]
strata = ["L0_public_cli", "L3_public_workflows"]
note = "L99 is enabled in this public repo because the current signoff lane is lightweight."

[[subtests]]
id = "L99_001"
file = "test_L99_001_release_signoff.py"
name = "Release Signoff"
description = "Validate version contract and run py_signoff"
concerns = ["release", "contracts"]
test_case_type = "audit_meta"

[subtests.code_under_test]
module = "altium_cruncher._version"

[subtests.objectives]
version_contract = "Date-based version metadata matches pyproject and package API"
cli_version = "CLI version output matches package API"
release_notes = "Changelog and dated release notes mention the package version"
python_hygiene = "py_signoff has zero findings"

[subtests.approach]
pytest = "Run package-local signoff checks as normal pytest tests"

[subtests.test_functions]
test_version_contract_matches_date_based_release = "Package version metadata follows the date release contract"
test_cli_emits_package_version = "CLI version commands emit the canonical package version text"
test_release_notes_mention_package_version = "Changelog and dated release notes mention the package version"
test_python_signoff_does_not_regress = "Python signoff produces zero findings"

[[subtests]]
id = "L99_002"
file = "test_L99_002_design_docs.py"
name = "Design Documentation Signoff"
description = "Validate CLI design document coverage"
concerns = ["release", "contracts", "docs", "signoff"]
test_case_type = "audit_meta"

[subtests.objectives]
design_index = "Master docs/design/index.html and CLI/API indexes exist"
command_inventory = "Actual parser commands match command manifest and CLI design docs exactly"
cli_docs = "Every registered CLI command has a matching docs/design/cli HTML page"
command_modules = "Every command except version has a dedicated command module"
config_contracts = "Command docs declare whether config contracts are required"

[subtests.approach]
pytest = "Inspect command manifest and matching design documentation"

[[subtests]]
id = "L99_005"
file = "test_L99_005_config_contracts.py"
name = "Config Contract Signoff"
description = "Validate public CLI config contracts and generated config template conformance"
concerns = ["release", "contracts", "docs", "signoff"]
test_case_type = "audit_meta"

[subtests.objectives]
contract_links = "Every CLI design doc declares none or an existing schema contract"
schema_validity = "Every docs/contracts/*.schema.json file is a valid JSON Schema"
generated_templates = "Generated default configs validate against their declared schemas"

[subtests.approach]
pytest = "Inspect command docs and validate generated config payloads with jsonschema"

[[subtests]]
id = "L99_004"
file = "test_L99_004_interface_design_docs.py"
name = "Interface Design Documentation Signoff"
description = "Validate dataclass and major-interface design documentation and test ownership"
concerns = ["release", "signoff", "docs"]
test_case_type = "audit_meta"

[subtests.objectives]
dataclass_docs = "Every public dataclass has a machine-readable design-doc section"
major_interface_docs = "Major public interfaces are listed with design and test requirements"
rack_test_ownership = "Each interface doc references an exercising Rack stratum and test target"

[subtests.approach]
pytest = "Inspect source AST, design HTML, Rack strata, and test files"
