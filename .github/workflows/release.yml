name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Verify changelog mentions package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          grep -F "## ${VERSION}" CHANGELOG.md
      - name: Run Rack suite
        run: uv run --extra test rack run --all
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed console test
        run: uv run --extra test python tests/support_scripts/install_test.py
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
