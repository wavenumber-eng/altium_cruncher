name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS CI is deferred for the first public release until hosted-runner
        # wheel compatibility is explicitly validated.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Validate Windows installer script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "scripts/install-altium-cruncher.ps1",
            [ref] $tokens,
            [ref] $errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
      - name: Run Rack suite
        run: uv run --extra test rack run --all
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed console test
        run: uv run --extra test python tests/support_scripts/install_test.py
